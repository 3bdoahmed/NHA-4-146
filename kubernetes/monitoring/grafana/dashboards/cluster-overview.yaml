apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
      "title": "Cluster Infrastructure Overview",
      "panels": [
        {
          "title": "Node CPU Usage (%)",
          "type": "timeseries",
          "targets": [{ "expr": "sum(rate(node_cpu_seconds_total{mode!=\"idle\"}[5m])) by (node) / sum(rate(node_cpu_seconds_total[5m])) by (node) * 100" }]
        },
        {
          "title": "Node Memory Usage (%)",
          "type": "timeseries",
          "targets": [{ "expr": "100 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100)" }]
        },
        {
          "title": "Pod Status by Namespace",
          "type": "state-timeline",
          "targets": [{ "expr": "sum by (namespace) (kube_pod_status_phase{phase=\"Running\"})" }]
        }
      ]
    }
