apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config-secret
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: "REPLACE_WITH_SLACK_WEBHOOK_URL"

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'slack-default'
      routes:
      - match:
          severity: critical
        receiver: 'slack-critical'
        continue: true

    receivers:
    - name: 'slack-default'
      slack_configs:
      - channel: '#monitoring-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: '{{ range .Alerts }}*Description:* {{ .Annotations.description }}\n{{ end }}'

    - name: 'slack-critical'
      slack_configs:
      - channel: '#monitoring-alerts-critical'
        send_resolved: true
        color: 'danger'
        title: ' [CRITICAL] [{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: '{{ range .Alerts }}*Description:* {{ .Annotations.description }}\n*Metric Value:* {{ .Annotations.value }}\n{{ end }}'