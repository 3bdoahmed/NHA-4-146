# Dev overrides for nha-monitoring
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 10Gi
  grafana:
    persistence:
      size: 5Gi

loki-stack:
  loki:
    persistence:
      enabled: false
    config:
      storage_config:
        aws:
          s3: "s3://us-east-1/easyshop-dev-logs-bucket"
