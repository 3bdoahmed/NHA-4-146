# =============================================================================
# Ansible Inventory for NHA-4-146 Kubernetes Cluster
# =============================================================================
# Replace the IP addresses and SSH key path with your actual values
# from the Terraform output after provisioning.
#
# Usage: ansible-playbook -i hosts.ini site.yml
# =============================================================================

# --- Master Node ---
[master]
master-node ansible_host=172.31.31.93

# --- Worker Nodes ---
[workers]
worker-node-1 ansible_host=172.31.27.111

# --- Cluster Group (combines master + workers) ---
[k8s_cluster:children]
master
workers

# --- Global Cluster Variables ---
[k8s_cluster:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/k8s-cluster-key.pem
ansible_python_interpreter=/usr/bin/python3
ansible_become=yes
ansible_become_method=sudo
